<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>PikaTrip Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Kiwi+Maru:wght@400;500&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --pika-yellow: #FFF2CC;
            --pika-orange: #F3A05F;
            --pika-brown: #5C4033;
            --bg-color: #FEF9EF;
            --pika-blue: #4A90E2;
            --pika-purple: #9B51E0;
            --text-gray: #888888;
        }
        * { font-family: 'Kiwi Maru', serif !important; box-sizing: border-box }
        body { background-color: var(--bg-color); color: var(--pika-brown); margin: 0; padding-bottom: 40px; display: flex; flex-direction: column; align-items: center }
        .top-bar { width: 100%; max-width: 420px; background: #fff; padding: 12px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--pika-yellow); position: sticky; top: 0; z-index: 100 }
        .view-section { width: 100%; max-width: 420px; display: none; padding: 15px }
        .view-section.active { display: block }
        .pika-header { font-size: 2.4rem; color: var(--pika-orange); text-align: center; margin: 15px 0; font-family: 'Mochiy Pop One'; text-shadow: 2px 2px #fff }
        .panel { background: #fff; padding: 22px; border-radius: 30px; border: 4px solid var(--pika-yellow); margin-bottom: 20px; box-shadow: 0 5px 0 var(--pika-yellow) }
        input, select, textarea { padding: 12px; border: 2px solid #F0F0F0; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: 0; font-size: 16px; background: #FAFAFA; color: var(--pika-brown); }
        .step-box { background: #FFFDF5; border: 2px dashed var(--pika-orange); padding: 18px; border-radius: 22px; margin-bottom: 18px; position: relative }
        .pika-btn { font-family: 'Kosugi Maru'; background: var(--pika-orange); color: #fff; border: none; padding: 16px; border-radius: 35px; cursor: pointer; width: 100%; font-weight: 700; font-size: 18px; box-shadow: 0 4px 0 #D35400; margin-top: 10px; }
        .nav-btn { font-family: 'Kosugi Maru'; background: #fff; border: 3px solid var(--pika-brown); padding: 12px; border-radius: 25px; width: 100%; cursor: pointer; margin-bottom: 15px; font-weight: 700; font-size: 16px; }
        .color-fav { display: flex; gap: 8px; margin-bottom: 12px; align-items: center }
        .fav-dot { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 0 1px #ccc }
        .date-group-header { background: #fff; padding: 18px; border-radius: 20px; border: 3px solid var(--pika-brown); margin-bottom: 12px; font-family: 'Mochiy Pop One'; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 3px 0 var(--pika-brown); font-size: 16px; }
        .total-orange { font-size: 16px; color: var(--pika-orange); font-weight: bold; }
        .loc-card { background: #fff; border: 3px solid var(--pika-brown); border-radius: 30px; padding: 22px; margin-bottom: 20px; position: relative; box-shadow: 5px 5px 0 rgba(0,0,0,0.05); transition: all 0.3s; user-select: none }
        .loc-card.checked-all { opacity: 0.35; filter: grayscale(0.6) }
        .card-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px }
        .dest-title { font-family: 'Kiwi Maru', serif !important; color: var(--pika-orange); font-size: 1.25rem; font-weight: 500; letter-spacing: 0.5px; flex: 1; margin: 0 }
        .price-label { color: var(--pika-orange); font-weight: 700; font-family: 'Mochiy Pop One'; font-size: 1rem; white-space: nowrap }
        .route-bundle { background: #FFFCEB; border-radius: 22px; padding: 15px; margin: 10px 0 }
        .route-item { padding: 0 0 15px 15px; position: relative; border-left: 6px solid #DDD; margin-bottom: 10px; transition: 0.2s }
        .route-item.checked { opacity: 0.25; text-decoration: line-through }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 8px; color: #fff; font-size: 13px; font-weight: bold; margin-bottom: 8px }
        .station-text { font-weight: 500; font-size: 16px; line-height: 1.4; display: block; margin: 3px 0; letter-spacing: 0.3px; }
        .time-val { color: var(--pika-blue); font-size: 14px; margin-left: 6px; font-weight: bold; }
        .dir-val { color: var(--pika-purple); font-size: 13px; font-weight: 500; margin: 2px 0; }
        .pay-val { font-size: 12px; font-weight: 700; color: var(--text-gray); margin-top: 2px; }
        .exit-val { font-size: 13px; color: #E67E22; font-weight: bold; margin-top: 2px; }
        .note-val { font-size: 13px; color: #888; margin-top: 8px; }
        .tool-btn { font-size: 12px; padding: 6px 10px; border-radius: 10px; border: 2px solid var(--pika-brown); background: #fff; cursor: pointer }
        .io-container { background: #fff; padding: 20px; border-radius: 30px; border: 3px dashed var(--pika-orange); margin: 30px 0; text-align: center }
        .io-btn { flex: 1; background: var(--pika-yellow); border: 2px solid var(--pika-brown); padding: 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; color: var(--pika-brown) }
        .trip-selector { border: 2px solid var(--pika-orange); border-radius: 10px; padding: 6px; font-size: 14px; max-width: 160px; background: #FFFDF5 }
    </style>
</head>
<body>
    <div id="appInterface" style="width:100%">
        <div class="top-bar">
            <div style="display:flex;align-items:center;gap:3px">
                <select id="tripSelect" class="trip-selector" onchange="switchTrip()"></select>
                <button class="tool-btn" onclick="renameTrip()">✏️</button>
                <button class="tool-btn" style="color:red" onclick="deleteTrip()">🗑️</button>
                <button class="tool-btn" style="background:var(--pika-yellow)" onclick="addNewTrip()">➕</button>
            </div>
            <div style="font-size: 10px; color: var(--pika-orange); font-family: 'Mochiy Pop One';">PikaTrip</div>
        </div>

        <div id="addView" class="view-section active">
            <h2 class="pika-header">PikaTrip</h2>
            <div class="panel">
                <input type="date" id="dateInp">
                <input type="text" id="destInp" placeholder="目的地">
                <div id="stepContainer"></div>
                <button class="nav-btn" style="border-style:dashed;font-size:14px" onclick="addStep()">+ 增加轉乘片段</button>
                <textarea id="noteInp" placeholder="備註..." rows="2"></textarea>
                <input type="hidden" id="editId">
                <button class="pika-btn" onclick="saveData()">儲存行程</button>
            </div>
            <button class="nav-btn" onclick="showList()">查看列表清單</button>
        </div>

        <div id="listView" class="view-section">
            <h2 class="pika-header">PikaTrip</h2>
            <button class="nav-btn" onclick="showAdd()">+ 新增下一筆</button>
            <div id="listItems"></div>
            <div class="io-container">
                <div style="display:flex;gap:10px">
                    <button class="io-btn" onclick="exportData()">📤 匯出</button>
                    <button class="io-btn" onclick="document.getElementById('importFile').click()">📥 匯入</button>
                </div>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
            </div>
            <script>
        const DB_KEY = 'PikaTravel_Stable_v1';
        let currentTrip = "預設旅程", allTrips = {}, myFavColors = ["#FF9500", "#F62E36", "#009BDB", "#99CC00", "#9530B0"], expandedDates = new Set();

        window.onload = function() { initApp(); };

        function initApp() {
            let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
                trips: {"預設旅程": []},
                favColors: myFavColors,
                lastTrip: "預設旅程"
            };
            allTrips = db.trips;
            currentTrip = db.lastTrip || Object.keys(allTrips)[0];
            myFavColors = db.favColors;
            document.getElementById("dateInp").valueAsDate = new Date();
            updateTripDropdown();
            if (document.getElementById('stepContainer').children.length === 0) addStep();
            render();
        }

        function updateTripDropdown() {
            document.getElementById('tripSelect').innerHTML = Object.keys(allTrips).map(t => `<option value="${t}" ${t === currentTrip ? 'selected' : ''}>${t}</option>`).join('')
        }

        function switchTrip() {
            currentTrip = document.getElementById('tripSelect').value;
            sync(); render()
        }

        function addNewTrip() {
            const n = prompt("新旅程名稱：");
            if (n && !allTrips[n]) {
                allTrips[n] = []; currentTrip = n;
                updateTripDropdown(); sync(); render()
            }
        }

        function renameTrip() {
            const n = prompt("修改旅程名稱：", currentTrip);
            if (n && n !== currentTrip) {
                allTrips[n] = allTrips[currentTrip];
                delete allTrips[currentTrip]; currentTrip = n;
                updateTripDropdown(); sync()
            }
        }

        function deleteTrip() {
            if (Object.keys(allTrips).length <= 1) return alert("至少要保留一個旅程喔！");
            if (confirm(`確定要刪除「${currentTrip}」整份旅程嗎？`)) {
                delete allTrips[currentTrip];
                currentTrip = Object.keys(allTrips)[0];
                updateTripDropdown(); sync(); render()
            }
        }

        function handleTimeInput(el) {
            let val = el.value.replace(/分/g, '').trim();
            if (val && !isNaN(val)) { el.value = val + "分"; }
        }

        function addStep(v = {}) {
            const c = document.getElementById('stepContainer'), d = document.createElement('div');
            d.className = 'step-box';
            d.innerHTML = `
                <div class="color-fav">${myFavColors.map(clr => `<div class="fav-dot" style="background:${clr}" onclick="this.parentElement.nextElementSibling.querySelector('.s-color').value='${clr}'"></div>`).join('')} <button class="tool-btn" onclick="saveColor(this)">存色</button></div>
                <div style="display:flex;gap:5px">
                    <input type="text" class="s-line" placeholder="路線" value="${v.line || ''}" style="flex:2">
                    <input type="color" class="s-color" value="${v.color || myFavColors[0]}" style="flex:0.5;height:45px">
                </div>
                <input type="text" class="s-dir" placeholder="方向" value="${v.dir || ''}" style="margin-bottom:8px">
                <div style="display:flex;gap:5px">
                    <input type="text" class="s-start" placeholder="起站" value="${v.start || ''}" style="flex:1">
                    <input type="text" class="s-end" placeholder="訖站" value="${v.end || ''}" style="flex:1">
                </div>
                <div style="display:flex;gap:5px">
                    <input type="text" class="s-time" placeholder="時間" value="${v.time || ''}" style="flex:1" onblur="handleTimeInput(this)">
                    <input type="number" class="s-price" placeholder="票價" value="${v.price || ''}" style="flex:1">
                </div>
                <div style="display:flex;gap:5px">
                    <input type="text" class="s-exit" placeholder="出口" value="${v.exit || ''}" style="flex:1">
                    <select class="s-pay" style="flex:1">
                        <option value="Suica/IC卡" ${v.pay === 'Suica/IC卡' ? 'selected' : ''}>Suica/IC卡</option>
                        <option value="JR券" ${v.pay === 'JR券' ? 'selected' : ''}>JR券</option>
                        <option value="地鐵券" ${v.pay === '地鐵券' ? 'selected' : ''}>地鐵券</option>
                        <option value="現金" ${v.pay === '現金' ? 'selected' : ''}>現金</option>
                    </select>
                </div>
                <button style="position:absolute;top:5px;right:8px;border:none;background:none;color:red;font-size:18px" onclick="this.parentElement.remove()">✖</button>
            `;
            c.appendChild(d)
        }

        function saveColor(b) {
            const clr = b.closest('.step-box').querySelector('.s-color').value;
            if (!myFavColors.includes(clr)) {
                myFavColors.unshift(clr); if (myFavColors.length > 5) myFavColors.pop();
                sync();
                document.querySelectorAll('.color-fav').forEach(div => {
                    div.innerHTML = myFavColors.map(c => `<div class="fav-dot" style="background:${c}" onclick="this.parentElement.nextElementSibling.querySelector('.s-color').value='${c}'"></div>`).join('') + ' <button class="tool-btn" onclick="saveColor(this)">存色</button>'
                })
            }
        }
                function saveData() {
            const dest = document.getElementById("destInp").value, eid = document.getElementById("editId").value, steps = [];
            if (!dest) return alert("目的地呢？");
            document.querySelectorAll('.step-box').forEach(b => {
                steps.push({
                    line: b.querySelector('.s-line').value, color: b.querySelector('.s-color').value,
                    dir: b.querySelector('.s-dir').value, start: b.querySelector('.s-start').value,
                    end: b.querySelector('.s-end').value, time: b.querySelector('.s-time').value,
                    price: b.querySelector('.s-price').value, exit: b.querySelector('.s-exit').value,
                    pay: b.querySelector('.s-pay').value, checked: false
                })
            });
            const id = eid || Date.now().toString(), item = {
                id, date: document.getElementById("dateInp").value, dest, steps,
                note: document.getElementById("noteInp").value, visited: false
            };
            const idx = allTrips[currentTrip].findIndex(e => e.id === id);
            if (idx > -1) allTrips[currentTrip][idx] = item; else allTrips[currentTrip].push(item);
            sync(); render(); alert("已儲存！"); clearForm(); showList();
        }

        function sync() { localStorage.setItem(DB_KEY, JSON.stringify({trips: allTrips, favColors: myFavColors, lastTrip: currentTrip})) }

        function clearForm() {
            document.getElementById("destInp").value = ""; document.getElementById("noteInp").value = "";
            document.getElementById("editId").value = ""; document.getElementById('stepContainer').innerHTML = "";
            addStep(); document.getElementById("dateInp").valueAsDate = new Date();
        }

        function getWeekday(dateString) { return ['週日', '週一', '週二', '週三', '週四', '週五', '週六'][new Date(dateString).getDay()]; }

        function render() {
            const c = document.getElementById("listItems"); c.innerHTML = "";
            const d = allTrips[currentTrip] || [], g = {};
            d.forEach(i => { if (!g[i.date]) g[i.date] = []; g[i.date].push(i) });
            Object.keys(g).sort().forEach(dt => {
                let total = 0; g[dt].forEach(i => i.steps.forEach(s => total += Number(s.price) || 0));
                const gd = document.createElement('div'), hd = document.createElement('div');
                hd.className = 'date-group-header';
                hd.innerHTML = `<div>📅 ${dt} (${getWeekday(dt)})</div><div class="total-orange">小計：${total}円 <span>▼</span></div>`;
                const lt = document.createElement('div');
                lt.style.display = expandedDates.has(dt) ? 'block' : 'none';
                hd.onclick = () => {
                    lt.style.display = lt.style.display === 'none' ? 'block' : 'none';
                    lt.style.display === 'none' ? expandedDates.delete(dt) : expandedDates.add(dt)
                };
                g[dt].forEach(i => {
                    let tp = 0, sh = "";
                    i.steps.forEach((s, si) => {
                        tp += Number(s.price) || 0;
                        sh += `<div class="route-item ${s.checked ? 'checked' : ''}" style="border-left-color:${s.color}" ondblclick="event.stopPropagation();toggleStep('${i.id}',${si})">
                            <div class="badge" style="background:${s.color}">${s.line}</div>
                            <div class="station-text">${s.start} → ${s.end} <span class="time-val">${s.time}</span></div>
                            ${s.dir ? `<div class="dir-val">往 ${s.dir}</div>` : ''}
                            <div class="pay-val">${s.pay}</div>
                            ${s.exit ? `<div class="exit-val">出口：${s.exit}</div>` : ''}
                        </div>`;
                    });
                    const card = document.createElement('div');
                    card.className = 'loc-card' + (i.visited ? ' checked-all' : '');
                    card.ondblclick = () => { i.visited = !i.visited; sync(); render() };
                    card.innerHTML = `<div class="card-header-row"><h3 class="dest-title">${i.dest}</h3><div class="price-label">${tp}円</div><div><button class="tool-btn" onclick="event.stopPropagation();moveItem('${i.id}',-1)">↑</button><button class="tool-btn" onclick="event.stopPropagation();moveItem('${i.id}',1)">↓</button></div></div><div class="route-bundle">${sh}</div><div class="note-val">備註：${i.note}</div><div style="text-align:right;margin-top:12px"><button class="tool-btn" onclick="event.stopPropagation();editItem('${i.id}')">修改</button><button class="tool-btn" style="color:red;margin-left:8px" onclick="event.stopPropagation();deleteItem('${i.id}')">刪除</button></div>`;
                    lt.appendChild(card)
                });
                gd.appendChild(hd); gd.appendChild(lt); c.appendChild(gd)
            })
        }

        function moveItem(id, dir) {
            const d = allTrips[currentTrip], idx = d.findIndex(e => e.id === id);
            if (idx === -1) return;
            const td = d[idx].date, sd = d.filter(e => e.date === td), idxD = sd.findIndex(e => e.id === id), newD = idxD + dir;
            if (newD < 0 || newD >= sd.length) return;
            const tI = sd[newD], gT = d.findIndex(e => e.id === tI.id);
            [d[idx], d[gT]] = [d[gT], d[idx]]; sync(); render()
        }

        function toggleStep(id, si) { const i = allTrips[currentTrip].find(e => e.id === id); if (i && i.steps[si]) { i.steps[si].checked = !i.steps[si].checked; sync(); render() } }

        function editItem(id) {
            const i = allTrips[currentTrip].find(e => e.id === id); if (!i) return;
            document.getElementById("dateInp").value = i.date; document.getElementById("destInp").value = i.dest;
            document.getElementById("noteInp").value = i.note; document.getElementById("editId").value = i.id;
            document.getElementById('stepContainer').innerHTML = ""; i.steps.forEach(s => addStep(s)); showAdd()
        }

        function deleteItem(id) { if (confirm("確定刪除？")) { allTrips[currentTrip] = allTrips[currentTrip].filter(e => e.id !== id); sync(); render() } }

        function showList() { document.getElementById("addView").classList.remove("active"); document.getElementById("listView").classList.add("active"); render() }

        function showAdd() { if (!document.getElementById("editId").value) { clearForm(); } document.getElementById("addView").classList.add("active"); document.getElementById("listView").classList.remove("active") }

        function exportData() {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([JSON.stringify(allTrips[currentTrip])], {type: "application/json"}));
            a.download = `PikaTrip_${currentTrip}.json`; a.click()
        }

        function importData(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = function(e) {
                try {
                    const d = JSON.parse(e.target.result), n = prompt("請為這份旅程命名：", "匯入的旅程");
                    if (n) { allTrips[n] = d; currentTrip = n; updateTripDropdown(); sync(); render(); alert("匯入完成！") }
                } catch (err) { alert("匯入失敗") }
            };
            r.readAsText(f); e.target.value = ""
        }
    </script>
</body>
</html>
        </div>
    </div>
