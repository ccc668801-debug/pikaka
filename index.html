<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PikaTrip Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff9f5;
            --nav-bg: #ffe4e1;
            --accent-pink: #ffb7b2;
            --text-color: #6d5d6e;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kiwi Maru', serif; }

        body, html { height: 100dvh; overflow: hidden; background-color: var(--bg-color); }

        /* 登入介面 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .login-box {
            background: var(--white); padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255, 183, 178, 0.2);
            text-align: center; width: 85%; max-width: 320px;
        }

        .login-box h2 { color: var(--accent-pink); margin-bottom: 20px; font-size: 1.4rem; }

        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1.5px solid var(--nav-bg); border-radius: 12px;
            outline: none; color: var(--text-color);
        }

        .login-box button {
            width: 100%; padding: 12px; background-color: var(--accent-pink);
            border: none; color: white; border-radius: 12px;
            margin-top: 15px; font-weight: bold; cursor: pointer;
        }

        /* 主畫面 */
        .main-wrapper { display: none; height: 100%; flex-direction: column; }

        .top-nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 70px; /* 稍微加高，讓間距更好看 */
            background-color: var(--nav-bg); 
            z-index: 100;
            padding: 0 12px;
            gap: 8px; /* 按鈕之間的間距 */
        }

        /* 讓按鈕區域自動填滿 */
        .nav-tabs-container {
            display: flex;
            flex: 1;
            gap: 6px;
            align-items: center;
        }

        .tab-btn {
            flex: 1; /* 重要：讓按鈕自動平分空間 */
            max-width: 80px; /* 限制最大寬度防止太扁 */
            background: rgba(255, 255, 255, 0.4); 
            border: none;
            padding: 10px 4px; /* 增加上下高度，減少左右內距 */
            border-radius: 14px; 
            color: var(--text-color);
            font-size: 0.85rem; /* 字體稍微加大 */
            font-weight: 500;
            white-space: nowrap;
            display: none; 
            text-align: center;
            transition: all 0.3s ease;
        }

        .tab-btn.active { 
            background: var(--white); 
            color: var(--accent-pink); 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 183, 178, 0.2);
        }

        .content-area { flex: 1; width: 100%; padding-bottom: env(safe-area-inset-bottom); }

        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* 設定與登出 */
        .nav-tools { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-left: 5px;
            padding-left: 5px;
            border-left: 1px solid rgba(255,255,255,0.5);
        }
        .tool-btn { font-size: 1rem; cursor: pointer; opacity: 0.7; }
        .logout-btn { font-size: 0.65rem; text-decoration: underline; color: var(--text-color); }

        /* 設定彈窗樣式保持不變 */
        #settings-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(2px);
        }
        .settings-box {
            background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 300px;
            border: 3px solid var(--nav-bg);
        }
        .settings-box h3 { color: var(--accent-pink); margin-bottom: 20px; text-align: center; }
        .setting-item { display: flex; align-items: center; margin: 15px 0; font-size: 1rem; }
        .setting-item input { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--accent-pink); }
        .save-settings-btn {
            width: 100%; padding: 12px; background: var(--accent-pink); color: white;
            border: none; border-radius: 15px; margin-top: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>PikaTrip</h2>
            <input type="text" id="username" value="molly5133" placeholder="帳號">
            <input type="password" id="password" value="1" placeholder="密碼">
            <button onclick="handleLogin()">進入系統</button>
            <p id="error-msg" style="color: #ff8b94; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="main-content" class="main-wrapper">
        <div class="top-nav">
            <div class="nav-tabs-container" id="tabs-container">
                <button class="tab-btn" id="btn-1" onclick="showApp(1, this)">交通</button>
                <button class="tab-btn" id="btn-2" onclick="showApp(2, this)">地圖</button>
                <button class="tab-btn" id="btn-3" onclick="showApp(3, this)">購物</button>
                <button class="tab-btn" id="btn-5" onclick="showApp(5, this)">代買</button>
                <button class="tab-btn" id="btn-4" onclick="showApp(4, this)">筆記</button>
            </div>
            
            <div class="nav-tools">
                <div class="tool-btn" onclick="toggleSettings()">⚙️</div>
                <div class="tool-btn logout-btn" onclick="logout()">登出</div>
            </div>
        </div>

        <div class="content-area">
            <iframe id="app1" src=""></iframe>
            <iframe id="app2" src=""></iframe>
            <iframe id="app3" src=""></iframe>
            <iframe id="app5" src=""></iframe>
            <iframe id="app4" src=""></iframe>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h3>介面顯示設定</h3>
            <div id="settings-list"></div>
            <button class="save-settings-btn" onclick="saveSettings()">儲存並更新</button>
        </div>
    </div>

    <script>
        const apps = {
            1: { name: "交通", file: "transportation.html" },
            2: { name: "地圖", file: "map.html" },
            3: { name: "購物", file: "shoppinglist.html" },
            5: { name: "代買", file: "daimai.html" },
            4: { name: "筆記", file: "pikanote.html" }
        };

        let visibleApps = JSON.parse(localStorage.getItem('pika_visible_apps')) || [1, 2, 3, 5, 4];

        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const error = document.getElementById('error-msg');

            if (!u || !p) {
                error.innerText = "請填寫帳號密碼";
                error.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('pika_users') || '{}');
            if (!users[u]) {
                users[u] = p;
                localStorage.setItem('pika_users', JSON.stringify(users));
            } else if (users[u] !== p) {
                error.innerText = "密碼錯誤！";
                error.style.display = 'block';
                return;
            }

            localStorage.setItem('pika_current_user', u);
            initApp(u);
        }

        function initApp(username) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            
            applyVisibility();

            Object.keys(apps).forEach(id => {
                const frame = document.getElementById('app' + id);
                if (frame) {
                    frame.src = `${apps[id].file}?user=${encodeURIComponent(username)}`;
                }
            });

            const firstId = visibleApps[0];
            if (firstId) {
                showApp(firstId, document.getElementById('btn-' + firstId));
            }
        }

        function applyVisibility() {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.style.display = 'none');
            visibleApps.forEach(id => {
                const btn = document.getElementById('btn-' + id);
                if (btn) btn.style.display = 'block';
            });
        }

        function showApp(index, btn) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const targetFrame = document.getElementById('app' + index);
            if (targetFrame) targetFrame.classList.add('active');
            if (btn) btn.classList.add('active');
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const list = document.getElementById('settings-list');
            
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                list.innerHTML = Object.keys(apps).map(id => `
                    <div class="setting-item">
                        <input type="checkbox" id="chk-${id}" ${visibleApps.includes(parseInt(id)) ? 'checked' : ''}>
                        <label for="chk-${id}">${apps[id].name}</label>
                    </div>
                `).join('');
                modal.style.display = 'flex';
            }
        }

        function saveSettings() {
            const newVisible = [];
            Object.keys(apps).forEach(id => {
                if (document.getElementById('chk-' + id).checked) {
                    newVisible.push(parseInt(id));
                }
            });

            if (newVisible.length === 0) {
                alert("請至少保留一個功能唷！");
                return;
            }

            visibleApps = newVisible;
            localStorage.setItem('pika_visible_apps', JSON.stringify(visibleApps));
            applyVisibility();
            showApp(visibleApps[0], document.getElementById('btn-' + visibleApps[0]));
            toggleSettings();
        }

        function logout() {
            localStorage.removeItem('pika_current_user');
            location.reload();
        }

        window.onload = function() {
            const loggedInUser = localStorage.getItem('pika_current_user');
            if (loggedInUser) {
                initApp(loggedInUser);
            }
        };
    </script>
</body>
</html>
