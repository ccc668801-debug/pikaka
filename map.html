<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Pikaka 513 Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root{--y:#FFFBE6;--o:#FFEDE0;--b:#666;--bg:#FFFEFD;--lo:#FFF9F0;--bl:#F0F9FF}
        *{font-family:'Kiwi Maru',serif;box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
        body{background:var(--bg);color:var(--b);margin:0;padding-bottom:100px;display:flex;flex-direction:column;align-items:center;min-height: 100vh;}
        .p-h{font-family:'Mochiy Pop One',sans-serif!important;font-size:2rem;color:#E0C3B0;text-align:center;margin:10px 0}
        
        /* Top Bar */
        .top-bar{background:#fff;padding:8px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid var(--y);position:sticky;top:0;z-index:100;width:100%;max-width:420px}
        .u-i{color:#D4A373;font-size:1rem;font-family:'Mochiy Pop One'!important}
        .io-btn{cursor:pointer;font-size:0.75rem;background:var(--bl);padding:4px 10px;border-radius:15px;color:#888}

        .view-sec{width:100%;max-width:420px;padding:0 10px;display:none;margin:0 auto}.view-sec.active{display:block}
        
        /* Nav */
        .bottom-nav{position:fixed;bottom:0;width:100%;max-width:420px;background:#fff;display:flex;justify-content:space-around;padding:10px 10px calc(10px + env(safe-area-inset-bottom));border-top:1.5px solid var(--y);z-index:1000}
        .nav-item{font-size:.8rem;cursor:pointer;text-align:center;color:#DDD;flex:1;font-family:'Mochiy Pop One'!important}
        .nav-item.active{color:#D4A373;font-weight:700}
        
        /* UI Components */
        .panel{background:#fff;padding:15px;border-radius:20px;border:1.5px solid var(--y);margin-bottom:15px}
        input,textarea{padding:10px;border:1px solid #FAFAFA;border-radius:10px;width:100%;margin-bottom:8px;background:#FDFDFD;color:var(--b);font-weight:300}
        .pika-btn{background:#E0C3B0;color:#fff;border:none;padding:12px;border-radius:30px;font-size:1rem;cursor:pointer;width:100%;box-shadow:0 3px 0 #CDB4A6;font-family:'Mochiy Pop One'!important}

        /* List 兩層結構 */
        .date-group { margin-bottom: 12px; }
        .date-header{background:var(--lo);padding:8px;border-radius:12px;cursor:pointer;font-family:'Mochiy Pop One'!important;text-align:center;font-size:0.85rem; margin-bottom: 6px; border: 1px solid var(--y); color:#B08968}
        .date-content { display: none; }
        .date-group.open .date-content { display: block; }

        .l-card{margin-bottom:8px;border-radius:15px;border:1px solid #F8F8F8;background:#fff; padding:10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02)}
        .l-h{display:flex;justify-content:space-between;align-items:center; margin-bottom: 4px;}
        .l-h-name{font-weight:400;font-size:0.9rem; color:#666; flex:1;}
        .s-item-box{background:#FFFEFA; border-radius:8px; padding:6px 10px; font-size:0.8rem; color:#999; border:1px solid #FFF9F0; margin-top:4px; white-space: pre-wrap;}

        /* 功能按鈕樣式 */
        .btn-g{display:flex; gap:3px;}
        .ed-btn, .del-btn{cursor:pointer;padding:4px 7px;font-size:0.75rem;border-radius:8px;background:#FDFDFD;border:1px solid #EEE;color:#AAA}
        .del-btn{color:#FFAB91}
        
        /* Modals */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.1);display:none;align-items:center;justify-content:center;z-index:3000}
        .modal-b{background:#fff;width:85%;max-width:340px;padding:20px;border-radius:30px;border:2px solid var(--y);text-align:center}
        .io-area{width:100%;height:120px;font-size:0.7rem;margin:10px 0;border:1px solid #EEE;}
    </style>
</head>
<body>
    <div id="appInterface" style="width:100%;max-width:420px">
        <div class="top-bar">
            <div>
                <div class="u-i">Hi! 513</div>
                <div style="display:flex; gap:8px; margin-top:2px">
                    <span onclick="openTM()" style="cursor:pointer;font-size:0.7rem;color:#AAA;text-decoration:underline;font-family:'Mochiy Pop One'"><span id="curTripN"></span></span>
                    <span class="io-btn" onclick="openIO()">備份/還原</span>
                </div>
            </div>
            <div style="font-size: 0.6rem; color: #F0F0F0; font-family: 'Mochiy Pop One';">Pikaka v8</div>
        </div>

        <div id="addView" class="view-sec active">
            <h2 class="p-h">Add</h2>
            <div class="panel">
                <input type="date" id="ld">
                <input type="text" id="ln" placeholder="要去哪裡？">
                <input type="text" id="lu" placeholder="地圖連結 (選填)">
                <button class="pika-btn" onclick="saveS()">加入清單</button>
            </div>
        </div>

        <div id="listView" class="view-sec"><h2 class="p-h">List</h2><div id="listItems"></div></div>
        
        <div id="noteListView" class="view-sec"><h2 class="p-h">Notes</h2><div id="noteItems"></div></div>
        <div id="noteAddView" class="view-sec"><h2 class="p-h">New Note</h2><div class="panel"><input type="text" id="ntT" placeholder="標題"><textarea id="ntC" placeholder="內容..." rows="10"></textarea><button class="pika-btn" onclick="saveN()">儲存筆記</button></div></div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="sw('add',this)"><span>ADD</span></div>
            <div class="nav-item" onclick="sw('list',this)"><span>LIST</span></div>
            <div class="nav-item" onclick="sw('noteList',this)"><span>NOTE</span></div>
            <div class="nav-item" onclick="sw('noteAdd',this)"><span>NEW</span></div>
        </nav>
    </div>

    <div id="tModal" class="modal"><div class="modal-b"><h3>旅程切換</h3><div id="tAcc" style="max-height:200px;overflow-y:auto;margin:10px 0"></div><input type="text" id="newTN" placeholder="新旅程"><button class="pika-btn" onclick="addT()">建立</button><br><br><button class="pika-btn" style="background:#F5F5F5;color:#AAA;box-shadow:none" onclick="closeM()">關閉</button></div></div>
    <div id="ioModal" class="modal"><div class="modal-b"><h3>資料備份</h3><textarea id="ioBox" class="io-area"></textarea><div style="display:flex;gap:5px"><button class="pika-btn" style="font-size:0.8rem" onclick="exportD()">複製代碼</button><button class="pika-btn" style="background:#C5E1A5;box-shadow:none;font-size:0.8rem" onclick="importD()">匯入</button></div><br><button class="pika-btn" style="background:#F5F5F5;color:#AAA;box-shadow:none" onclick="closeM()">關閉</button></div></div>

<script>
const DK='pikaka_513_v8';
let curU="5133", curT="default", db={}, openD=[];

window.onload = function() { initApp(); };
function initApp() {
    db = JSON.parse(localStorage.getItem(DK)) || {};
    if (!db[curU]) { db[curU] = {trips: {"default": "我的旅遊"}, curT: "default", data: {"default": {items: [], notes: []}}}; save(); }
    curT = db[curU].curT || "default";
    document.getElementById('curTripN').innerText = db[curU].trips[curT];
    document.getElementById('ld').valueAsDate = new Date(); 
    render(); renderN();
}
function save(){localStorage.setItem(DK,JSON.stringify(db))}
function sw(v,el){document.querySelectorAll('.view-sec').forEach(s=>s.classList.remove('active'));document.getElementById(v+'View').classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));if(el)el.classList.add('active');if(v==='list')render();if(v==='noteList')renderN()}
function closeM(){document.querySelectorAll('.modal').forEach(m=>m.style.display='none')}

// --- LIST 邏輯 ---
function render(){
    const d=db[curU].data[curT], list=document.getElementById('listItems'); list.innerHTML="";
    const gDate={}; d.items.forEach((i,idx)=>{const dk=i.ld||"未排期"; if(!gDate[dk])gDate[dk]=[]; gDate[dk].push({...i,origIdx:idx})});
    
    Object.keys(gDate).sort().forEach(date=>{
        const isDO=openD.includes(date), dDiv=document.createElement('div'); dDiv.className=`date-group ${isDO?'open':''}`;
        let h=`<div class="date-header" onclick="tgD('${date}')">📅 ${date}</div><div class="date-content">`;
        gDate[date].forEach((item)=>{
            h+=`<div class="l-card"><div class="l-h">`
            + `<div class="l-h-name">${item.ln}${item.lu?`<button style="margin-left:5px;font-size:0.6rem;border:none;background:var(--bl);border-radius:5px" onclick="event.stopPropagation();window.open('${item.lu}')">GO</button>`:''}</div>`
            + `<div class="btn-g">`
            + `<span class="ed-btn" onclick="moveL(${item.origIdx},-1)">↑</span>`
            + `<span class="ed-btn" onclick="moveL(${item.origIdx},1)">↓</span>`
            + `<span class="ed-btn" onclick="edL(${item.origIdx})">✎</span>`
            + `<span class="del-btn" onclick="delL(${item.origIdx})">✘</span>`
            + `</div></div>`
            + (item.sd?`<div class="s-item-box">${item.sd}</div>`:'') + `</div>`;
        });
        h+=`</div>`; dDiv.innerHTML=h; list.appendChild(dDiv);
    })
}

function saveS(){
    const ld=document.getElementById('ld').value, ln=document.getElementById('ln').value.trim(), lu=document.getElementById('lu').value.trim();
    if(!ln)return; 
    db[curU].data[curT].items.push({ld,ln,lu,sd:""});
    save(); render(); 
    ['ln','lu'].forEach(i=>document.getElementById(i).value=""); 
    sw('list',document.querySelectorAll('.nav-item')[1]);
}

function edL(idx){
    const item=db[curU].data[curT].items[idx];
    const nN = prompt("修改地名：", item.ln); if(nN) item.ln = nN;
    const nS = prompt("修改/增加備註：", item.sd || ""); if(nS!==null) item.sd = nS;
    const nU = prompt("修改連結：", item.lu || ""); if(nU!==null) item.lu = nU;
    save(); render();
}

function moveL(idx,dir){
    const items=db[curU].data[curT].items; 
    const nIdx=idx+dir; 
    if(nIdx<0||nIdx>=items.length)return; 
    [items[idx],items[nIdx]]=[items[nIdx],items[idx]]; 
    save(); render();
}

function delL(idx){
    if(confirm("確定刪除此地點？")){db[curU].data[curT].items.splice(idx,1);save();render();}
}

function tgD(d){const i=openD.indexOf(d); i===-1?openD.push(d):openD.splice(i,1); render()}

// --- NOTE & TRIPS ---
function renderN(){
    const d=db[curU].data[curT],list=document.getElementById('noteItems');list.innerHTML="";
    d.notes.forEach((n,i)=>{
        let h=`<div class="panel" style="padding:10px; margin-bottom:10px"><b>${n.t}</b><div style="font-size:0.85rem;white-space:pre-wrap;margin-top:5px;color:#888">${n.c}</div><div style="text-align:right"><span class="del-btn" onclick="delN(${i})">✘</span></div></div>`;
        list.innerHTML+=h;
    })
}
function saveN(){
    const t=document.getElementById('ntT').value.trim(), c=document.getElementById('ntC').value.trim(); if(!t)return;
    db[curU].data[curT].notes.push({t,c}); save(); renderN();
    document.getElementById('ntT').value="";document.getElementById('ntC').value=""; sw('noteList',document.querySelectorAll('.nav-item')[2]);
}
function delN(i){if(confirm("刪筆記？")){db[curU].data[curT].notes.splice(i,1);save();renderN();}}
function openTM(){const a=document.getElementById('tAcc');a.innerHTML="";for(let i in db[curU].trips){a.innerHTML+=`<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #f9f9f9"><span onclick="switchT('${i}')" style="cursor:pointer;flex:1">${db[curU].trips[i]}</span><span class="del-btn" onclick="delT('${i}')">✘</span></div>`}document.getElementById('tModal').style.display='flex'}
function addT(){const n=document.getElementById('newTN').value.trim();if(!n)return;const id='t'+Date.now();db[curU].trips[id]=n;db[curU].data[id]={items:[],notes:[]};save();openTM()}
function switchT(id){curT=id;db[curU].curT=id;save();initApp();closeM()}
function delT(id){if(id==='default')return; if(confirm("刪除整個旅程？")){delete db[curU].trips[id];delete db[curU].data[id];if(curT===id)curT='default';save();openTM()}}
function openIO(){document.getElementById('ioModal').style.display='flex'}
function exportD(){document.getElementById('ioBox').value=JSON.stringify(db);document.getElementById('ioBox').select();document.execCommand('copy');alert("代碼已複製！可以存到手機記事本。")}
function importD(){try{const d=JSON.parse(document.getElementById('ioBox').value);if(d){db=d;save();initApp();alert("匯入成功！");closeM();}}catch(e){alert("格式錯誤！")}}
</script>
</body>
</html>
