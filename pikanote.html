<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>日系手帳 - PikaNote v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Kiwi+Maru:wght@400;500&family=Varela+Round&family=Kosugi+Maru&family=Sawarabi+Gothic&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--jp-white:#FAF9F6;--jp-gray:#4A4A4A;--jp-accent:#8EACCD}
        .font-style-0{font-family:'Zen Maru Gothic',sans-serif}
        .font-style-1{font-family:'M PLUS Rounded 1c',sans-serif}
        .font-style-2{font-family:'Kiwi Maru',serif}
        .font-style-3{font-family:'Kosugi Maru',sans-serif}
        .font-style-4{font-family:'Varela Round','Zen Maru Gothic',sans-serif}

        body{background-color:var(--jp-white);color:var(--jp-gray);transition:all .3s;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
        .nav-btn{padding:12px 15px;font-size:.9rem;color:#A0A0A0;position:relative;transition:.3s}
        .nav-btn.active{color:#2D3436;font-weight:700}
        .nav-btn.active::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:12px;height:3px;background:var(--jp-accent);border-radius:10px}
        
        .page{display:none;animation:fadeIn .3s ease}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        
        /* 便條卡片樣式 */
        .note-card{transition: transform 0.2s ease; cursor: pointer; position: relative; overflow: hidden;}
        .note-card:active{transform: scale(0.98);}
        .note-card.dimmed{opacity: 0.5; filter: grayscale(50%);}

        /* 待辦樣式 */
        .todo-card{background:#fff;border-radius:30px;padding:25px;box-shadow:0 4px 15px rgba(0,0,0,.02)}
        .todo-category-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-weight:700;color:#333}
        .todo-category-line{width:4px;height:18px;background:#8EACCD;border-radius:10px}
        .todo-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f8f8f8}
        .todo-checkbox{width:22px;height:22px;border:2px solid #E0E0E0;border-radius:50%;cursor:pointer;position:relative}
        .todo-checkbox.checked{background:#8EACCD;border-color:#8EACCD}
        .todo-checkbox.checked::after{content:'✓';color:#fff;position:absolute;font-size:12px;top:50%;left:50%;transform:translate(-50%,-50%)}
        
        /* 顏色主題 */
        .bg-color-1{background-color:#FFECF1!important}.bg-color-2{background-color:#E0F2FE!important}.bg-color-3{background-color:#F0FDF4!important}.bg-color-4{background-color:#FFFBEB!important}.bg-color-5{background-color:#F5F3FF!important}.bg-white-card{background-color:#FFF!important;border:1px solid #F0F0F0!important}
        
        /* 全螢幕編輯器 */
        #editor-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            z-index:1000; background:var(--jp-white); overflow-y:auto; padding-bottom:100px;
        }
        .editor-content:focus{outline:none}
        
        /* 圖片組件 */
        .img-grid{display:flex;flex-wrap:wrap;gap:10px;margin:15px 0}
        .thumb-img{width:85px;height:85px;object-fit:cover;border-radius:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        .delete-img-btn{position:absolute;top:-6px;right:-6px;background:#ff4757;color:white;width:22px;height:22px;border-radius:50%;font-size:14px;display:flex;justify-content:center;align-items:center;z-index:10}
        
        /* 燈箱 */
        .lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;justify-content:center;align-items:center;cursor:zoom-out}
        .lightbox img{max-width:98%;max-height:98%;object-fit:contain}
    </style>
</head>
<body class="min-h-screen pb-24 font-style-0" id="main-body">

    <div id="editor-overlay">
        <div class="max-w-2xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closeEditor()" class="text-stone-400 font-bold">✕ 關閉並返回</button>
                <div class="flex gap-2">
                    <label class="cursor-pointer bg-stone-100 px-4 py-2 rounded-full text-sm">🖼️ 增加圖片<input type="file" multiple class="hidden" onchange="handleImageUpload(event, 'edit')"></label>
                </div>
            </div>
            
            <input type="text" id="edit-item-title" oninput="autoSaveEdit()" class="w-full text-2xl font-bold bg-transparent border-none outline-none mb-4 text-stone-800" placeholder="標題">
            <div id="edit-img-grid" class="img-grid"></div>
            <div id="edit-content" contenteditable="true" oninput="autoSaveEdit()" class="w-full min-h-[50vh] text-lg leading-relaxed text-stone-700 editor-content" placeholder="開始書寫..."></div>
            
            <div class="mt-12 pt-8 border-t border-stone-100 flex justify-between items-center">
                <button onclick="toggleDimCurrent()" id="dim-btn" class="text-stone-400 text-sm">標記為已完成 (淡出)</button>
                <button onclick="deleteCurrentNote()" class="text-red-300 text-sm italic">刪除此便條</button>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <nav id="main-nav" class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-stone-100 px-4">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-14">
            <button onclick="showPage('create-page')" class="nav-btn active" id="btn-create-page">新增</button>
            <button onclick="showPage('todo-page')" class="nav-btn" id="btn-todo-page">待辦</button>
            <button onclick="showPage('note-page')" class="nav-btn" id="btn-note-page">便條</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-20 px-6">
        
        <section id="create-page" class="page active">
            <div class="mb-8"><h1 class="text-3xl font-black text-stone-800 tracking-tighter">PIKANOTE</h1><p id="quote-display" class="text-xs text-stone-400 mt-1 italic"></p></div>
            <div class="grid grid-cols-1 gap-4">
                <div onclick="showSubPage('add-todo-sub')" class="bg-white p-8 rounded-[32px] shadow-sm border border-stone-100 text-center cursor-pointer">
                    <span class="text-3xl">📋</span><p class="font-bold text-stone-700 mt-2">快速待辦</p>
                </div>
                <div onclick="showSubPage('add-note-sub')" class="bg-white p-8 rounded-[32px] shadow-sm border border-stone-100 text-center cursor-pointer">
                    <span class="text-3xl">✍️</span><p class="font-bold text-stone-700 mt-2">心情便條</p>
                </div>
            </div>
        </section>

        <section id="add-note-sub" class="page">
            <button onclick="showPage('create-page')" class="mb-4 text-stone-400 font-bold text-sm">← 返回</button>
            <div class="bg-white rounded-[32px] p-6 shadow-sm space-y-4">
                <div class="flex gap-2 overflow-x-auto py-2 no-scrollbar">
                    <div onclick="selectColor('bg-color-1',this)" class="color-dot bg-color-1 active w-8 h-8 rounded-full border-2 border-transparent cursor-pointer"></div>
                    <div onclick="selectColor('bg-color-2',this)" class="color-dot bg-color-2 w-8 h-8 rounded-full border-2 border-transparent cursor-pointer"></div>
                    <div onclick="selectColor('bg-color-3',this)" class="color-dot bg-color-3 w-8 h-8 rounded-full border-2 border-transparent cursor-pointer"></div>
                    <div onclick="selectColor('bg-color-4',this)" class="color-dot bg-color-4 w-8 h-8 rounded-full border-2 border-transparent cursor-pointer"></div>
                    <div onclick="selectColor('bg-color-5',this)" class="color-dot bg-color-5 w-8 h-8 rounded-full border-2 border-transparent cursor-pointer"></div>
                </div>
                <input type="text" id="new-group-title" class="w-full p-4 bg-stone-50 rounded-2xl outline-none font-bold" placeholder="分組名稱 (如：2024筆記)">
                <input type="text" id="new-item-title" class="w-full p-4 bg-stone-50 rounded-2xl outline-none" placeholder="便條標題 (可不填)">
                <div id="new-img-grid" class="img-grid"></div>
                <label class="block text-center p-4 border-2 border-dashed border-stone-100 rounded-2xl cursor-pointer text-stone-400">🖼️ 選擇圖片<input type="file" multiple class="hidden" onchange="handleImageUpload(event, 'new')"></label>
                <div id="new-note-editor" contenteditable="true" class="min-h-[150px] p-4 bg-color-1 rounded-2xl outline-none" placeholder="寫點什麼..."></div>
                <button onclick="saveNewNote()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold">完成並儲存</button>
            </div>
        </section>

        <section id="todo-page" class="page"><div id="todo-container" class="space-y-4"></div></section>

        <section id="note-page" class="page"><div id="group-list" class="space-y-3"></div></section>

        <section id="detail-page" class="page">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('note-page')" class="text-stone-400">←</button>
                <h2 id="group-display-title" contenteditable="true" onblur="renameGroup(this.innerText)" class="text-xl font-bold"></h2>
            </div>
            <div id="note-grid" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="add-todo-sub" class="page">
            <button onclick="showPage('create-page')" class="mb-4 text-stone-400 font-bold text-sm">← 返回</button>
            <div class="bg-white rounded-[32px] p-6 shadow-sm space-y-4">
                <input type="text" id="todo-cat-input" class="w-full p-4 bg-stone-50 rounded-2xl outline-none" placeholder="分類 (如: 買東西)">
                <textarea id="todo-text-input" class="w-full p-4 bg-stone-50 rounded-2xl outline-none min-h-[150px]" placeholder="輸入內容，換行可新增多項"></textarea>
                <button onclick="addNewTodo()" class="w-full bg-[#8EACCD] text-white py-4 rounded-2xl font-bold">加入清單</button>
            </div>
        </section>

    </main>

    <div class="fixed bottom-6 left-6 z-50">
        <button onclick="cycleFont()" class="w-12 h-12 bg-white rounded-full shadow-lg border border-stone-100 flex items-center justify-center text-[10px] font-bold">字體</button>
    </div>

    <script>
        const STORAGE_KEY = `pika_v20_db_513`;
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {todos:[], groups:{}, fontIdx:0};
        let currentGroup = '', currentNoteIdx = -1, tempImages = [], selectedColor = 'bg-color-1';
        const fontClasses = ['font-style-0', 'font-style-1', 'font-style-2', 'font-style-3', 'font-style-4'];

        function init() {
            applyFont();
            renderTodos();
            renderGroups();
            document.getElementById('quote-display').innerText = "日日是好日。一步ずつ、前へ。";
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            const navBtn = document.getElementById('btn-' + pId);
            if(navBtn) navBtn.classList.add('active');
            if(pId === 'todo-page') renderTodos();
            if(pId === 'note-page') renderGroups();
        }

        function showSubPage(id) { showPage(id); }

        // --- 便條功能 ---
        function selectColor(c, el) {
            selectedColor = c;
            document.querySelectorAll('.color-dot').forEach(d => d.style.borderColor = 'transparent');
            el.style.borderColor = '#4A4A4A';
            document.getElementById('new-note-editor').className = `min-h-[150px] p-4 rounded-2xl outline-none ${c}`;
        }

        async function handleImageUpload(e, mode) {
            const files = Array.from(e.target.files);
            for(let file of files) {
                const base64 = await resizeImg(file);
                if(mode === 'new') {
                    tempImages.push(base64);
                    renderImgGrid('new-img-grid', tempImages, true);
                } else {
                    db.groups[currentGroup][currentNoteIdx].images.push(base64);
                    save();
                    renderImgGrid('edit-img-grid', db.groups[currentGroup][currentNoteIdx].images, false);
                }
            }
        }

        function resizeImg(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 800;
                        if(w > h && w > max) { h *= max/w; w = max; } else if(h > max) { w *= max/h; h = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        res(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderImgGrid(containerId, imgs, isNew) {
            const container = document.getElementById(containerId);
            container.innerHTML = imgs.map((src, i) => `
                <div class="relative">
                    <img src="${src}" class="thumb-img" onclick="zoomImg('${src}')">
                    <button onclick="removeImg(${i}, ${isNew})" class="delete-img-btn">×</button>
                </div>
            `).join('');
        }

        function removeImg(i, isNew) {
            if(isNew) {
                tempImages.splice(i, 1);
                renderImgGrid('new-img-grid', tempImages, true);
            } else {
                db.groups[currentGroup][currentNoteIdx].images.splice(i, 1);
                save();
                renderImgGrid('edit-img-grid', db.groups[currentGroup][currentNoteIdx].images, false);
            }
        }

        function zoomImg(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function saveNewNote() {
            const gName = document.getElementById('new-group-title').value.trim() || '未分類';
            const content = document.getElementById('new-note-editor').innerText.trim();
            if(!content && tempImages.length === 0) return;

            if(!db.groups[gName]) db.groups[gName] = [];
            db.groups[gName].push({
                title: document.getElementById('new-item-title').value.trim() || '',
                content: content,
                images: [...tempImages],
                color: selectedColor,
                dimmed: false,
                id: Date.now()
            });
            save();
            // 重置
            document.getElementById('new-group-title').value = '';
            document.getElementById('new-item-title').value = '';
            document.getElementById('new-note-editor').innerText = '';
            tempImages = [];
            document.getElementById('new-img-grid').innerHTML = '';
            showPage('note-page');
        }

        function renderGroups() {
            const list = document.getElementById('group-list');
            list.innerHTML = Object.keys(db.groups).map(g => `
                <div onclick="openGroup('${g}')" class="bg-white p-5 rounded-2xl border border-stone-100 flex justify-between items-center cursor-pointer">
                    <span class="font-bold">${g}</span>
                    <span class="text-xs text-stone-300">${db.groups[g].length} 張便條</span>
                </div>
            `).join('') || '<p class="text-center text-stone-300 py-10">尚無便條</p>';
        }

        function openGroup(g) {
            currentGroup = g;
            showPage('detail-page');
            document.getElementById('group-display-title').innerText = g;
            renderNoteGrid();
        }

        function renderNoteGrid() {
            const grid = document.getElementById('note-grid');
            grid.innerHTML = db.groups[currentGroup].map((n, i) => `
                <div onclick="openEditor(${i})" class="note-card p-4 rounded-2xl ${n.color} ${n.dimmed ? 'dimmed' : ''}">
                    ${n.images.length > 0 ? `<img src="${n.images[0]}" class="w-full h-24 object-cover rounded-lg mb-2">` : ''}
                    <h4 class="font-bold text-sm truncate">${n.title || '無標題'}</h4>
                    <p class="text-xs text-stone-500 line-clamp-2 mt-1">${n.content}</p>
                </div>
            `).join('');
        }

        // --- 全螢幕編輯邏輯 ---
        function openEditor(idx) {
            currentNoteIdx = idx;
            const note = db.groups[currentGroup][idx];
            document.getElementById('edit-item-title').value = note.title;
            document.getElementById('edit-content').innerText = note.content;
            renderImgGrid('edit-img-grid', note.images, false);
            document.getElementById('editor-overlay').style.display = 'block';
            document.getElementById('editor-overlay').className = note.color;
            document.getElementById('dim-btn').innerText = note.dimmed ? '取消淡出標記' : '標記為已完成 (淡出)';
        }

        function closeEditor() {
            document.getElementById('editor-overlay').style.display = 'none';
            renderNoteGrid();
        }

        function autoSaveEdit() {
            const note = db.groups[currentGroup][currentNoteIdx];
            note.title = document.getElementById('edit-item-title').value;
            note.content = document.getElementById('edit-content').innerText;
            save();
        }

        function toggleDimCurrent() {
            const note = db.groups[currentGroup][currentNoteIdx];
            note.dimmed = !note.dimmed;
            save();
            document.getElementById('dim-btn').innerText = note.dimmed ? '取消淡出標記' : '標記為已完成 (淡出)';
        }

        function deleteCurrentNote() {
            if(confirm('確定要刪除這張便條嗎？')) {
                db.groups[currentGroup].splice(currentNoteIdx, 1);
                if(db.groups[currentGroup].length === 0) delete db.groups[currentGroup];
                save();
                closeEditor();
                showPage(db.groups[currentGroup] ? 'detail-page' : 'note-page');
            }
        }

        function renameGroup(newK) {
            newK = newK.trim();
            if(!newK || newK === currentGroup) return;
            db.groups[newK] = db.groups[currentGroup];
            delete db.groups[currentGroup];
            currentGroup = newK;
            save();
        }

        // --- 待辦功能 ---
        function addNewTodo() {
            const text = document.getElementById('todo-text-input').value;
            const cat = document.getElementById('todo-cat-input').value || '一般';
            if(!text.trim()) return;
            text.split('\n').filter(l => l.trim()).forEach(l => {
                db.todos.push({text: l.trim(), cat, done: false, id: Date.now() + Math.random()});
            });
            save();
            document.getElementById('todo-text-input').value = '';
            showPage('todo-page');
        }

        function renderTodos() {
            const container = document.getElementById('todo-container');
            const cats = [...new Set(db.todos.map(t => t.cat))];
            container.innerHTML = cats.map(c => `
                <div class="todo-card">
                    <div class="todo-category-header"><div class="todo-category-line"></div>${c}</div>
                    ${db.todos.filter(t => t.cat === c).map(t => `
                        <div class="todo-item" onclick="toggleTodo(${t.id})">
                            <div class="flex items-center gap-3">
                                <div class="todo-checkbox ${t.done ? 'checked' : ''}"></div>
                                <span class="${t.done ? 'line-through text-stone-300' : ''}">${t.text}</span>
                            </div>
                            <button onclick="event.stopPropagation(); deleteTodo(${t.id})" class="text-stone-300">✕</button>
                        </div>
                    `).join('')}
                </div>
            `).join('') || '<p class="text-center text-stone-300 py-10">清爽的清單！</p>';
        }

        function toggleTodo(id) {
            const t = db.todos.find(x => x.id === id);
            t.done = !t.done;
            save();
            renderTodos();
        }

        function deleteTodo(id) {
            db.todos = db.todos.filter(x => x.id !== id);
            save();
            renderTodos();
        }

        function cycleFont() {
            db.fontIdx = (db.fontIdx + 1) % fontClasses.length;
            applyFont();
            save();
        }

        function applyFont() {
            document.getElementById('main-body').className = `min-h-screen pb-24 ${fontClasses[db.fontIdx]}`;
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `PikaNote_Backup.json`;
            a.click();
        }

        function importData(e) {
            const r = new FileReader();
            r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); location.reload(); };
            r.readAsText(e.target.files[0]);
        }

        init();
    </script>
</body>
</html>
